name: Daily Market Briefing (manual fallback)

# The daily 5AM WIB briefing is generated by a scheduled Claude cloud routine
# (see ROUTINE.md) — it researches the narrative on the Claude subscription and
# pushes the finished files to main, so NO Anthropic API key is needed.
#
# This workflow is only a manual fallback: it can regenerate a briefing on
# demand, but its narrative step calls the Anthropic API, which requires a paid
# ANTHROPIC_API_KEY repository secret. Without that secret, do not run it.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate today's briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate-briefing

      - name: Commit and push
        run: |
          git config user.name "daily-briefing-bot"
          git config user.email "actions@users.noreply.github.com"
          git add briefings/ briefings-data.js
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily market briefing (manual run)"
          git push
