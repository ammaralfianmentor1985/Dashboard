[build]
  publish = "."
  command = ""

[build.environment]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# --- Mentor Markets app (/app/) additions: functions + service-worker header ---

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/app/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
